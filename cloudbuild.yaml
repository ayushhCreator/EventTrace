substitutions:
  _REGION: asia-south1
  _AR_REPO: asia-south1-docker.pkg.dev/supersahayak/supersahayak
  _SQL_CONN: supersahayak:asia-south1:supersahayak-pg
  _RUN_SA: supersahayak-run-sa@supersahayak.iam.gserviceaccount.com
  _FIREBASE_PROJECT: legalsupersahayak                         # Firebase Hosting project
  _WEB_REPO: ayushhCreator/EventTrace-Web                     # set in trigger
  _VITE_API_URL: https://supersahayak-api-1085288406739.asia-south1.run.app

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/GH_PAT/versions/latest
      env: GH_PAT
    - versionName: projects/$PROJECT_ID/secrets/FIREBASE_SERVICE_ACCOUNT/versions/latest
      env: FIREBASE_SERVICE_ACCOUNT

steps:
  # ── Build images ────────────────────────────────────────────────────────────
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args: [build, -f, Dockerfile.api, -t, "$_AR_REPO/api:$SHORT_SHA", .]

  - id: build-scraper
    name: gcr.io/cloud-builders/docker
    args: [build, -f, Dockerfile.scraper, -t, "$_AR_REPO/scraper:$SHORT_SHA", .]

  # ── Push images ─────────────────────────────────────────────────────────────
  - id: push-api
    name: gcr.io/cloud-builders/docker
    waitFor: [build-api]
    args: [push, "$_AR_REPO/api:$SHORT_SHA"]

  - id: push-scraper
    name: gcr.io/cloud-builders/docker
    waitFor: [build-scraper]
    args: [push, "$_AR_REPO/scraper:$SHORT_SHA"]

  # ── Migrate ─────────────────────────────────────────────────────────────────
  - id: deploy-migrate-job
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-api]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs deploy supersahayak-migrate \
          --image "$_AR_REPO/api:$SHORT_SHA" \
          --region $_REGION \
          --command alembic \
          --args "upgrade,head" \
          --set-cloudsql-instances $_SQL_CONN \
          --set-secrets DATABASE_URL=DATABASE_URL:latest \
          --service-account $_RUN_SA \
          --project $PROJECT_ID

  - id: run-migrate
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [deploy-migrate-job]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs execute supersahayak-migrate \
          --region $_REGION \
          --wait \
          --project $PROJECT_ID

  # ── Deploy backend services ─────────────────────────────────────────────────
  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [run-migrate]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy supersahayak-api \
          --image "$_AR_REPO/api:$SHORT_SHA" \
          --region $_REGION \
          --platform managed \
          --allow-unauthenticated \
          --port 8080 \
          --min-instances 0 \
          --max-instances 5 \
          --set-cloudsql-instances $_SQL_CONN \
          --set-secrets DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,MSG91_AUTH_KEY=MSG91_AUTH_KEY:latest,MSG91_TEMPLATE_ID=MSG91_TEMPLATE_ID:latest,OTP_HMAC_SECRET=OTP_HMAC_SECRET:latest,RESEND_API_KEY=RESEND_API_KEY:latest,RESEND_FROM_EMAIL=RESEND_FROM_EMAIL:latest \
          --set-env-vars CHD_API_HOST=0.0.0.0,CHD_API_PORT=8080,MSG91_WHATSAPP_NUMBER=15559599221 \
          --service-account $_RUN_SA \
          --project $PROJECT_ID

  - id: deploy-monitor
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-scraper, run-migrate]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy supersahayak-monitor \
          --image "$_AR_REPO/scraper:$SHORT_SHA" \
          --region $_REGION \
          --platform managed \
          --no-allow-unauthenticated \
          --command scripts/start-monitor.sh \
          --port 8080 \
          --min-instances 1 \
          --max-instances 1 \
          --timeout 300 \
          --set-cloudsql-instances $_SQL_CONN \
          --set-secrets DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,OTP_HMAC_SECRET=OTP_HMAC_SECRET:latest,MSG91_AUTH_KEY=MSG91_AUTH_KEY:latest \
          --set-env-vars MSG91_WHATSAPP_NUMBER=15559599221,CHD_EMBED_CAUSELIST_SCHEDULER=0 \
          --service-account $_RUN_SA \
          --project $PROJECT_ID

  - id: deploy-scheduler
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    waitFor: [push-scraper, run-migrate]
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run deploy supersahayak-scheduler \
          --image "$_AR_REPO/scraper:$SHORT_SHA" \
          --region $_REGION \
          --platform managed \
          --no-allow-unauthenticated \
          --command scripts/start-scheduler.sh \
          --port 8080 \
          --min-instances 1 \
          --max-instances 1 \
          --timeout 300 \
          --set-cloudsql-instances $_SQL_CONN \
          --set-secrets DATABASE_URL=DATABASE_URL:latest,JWT_SECRET=JWT_SECRET:latest,OTP_HMAC_SECRET=OTP_HMAC_SECRET:latest,MSG91_AUTH_KEY=MSG91_AUTH_KEY:latest \
          --set-env-vars MSG91_WHATSAPP_NUMBER=15559599221 \
          --service-account $_RUN_SA \
          --project $PROJECT_ID

  # ── Deploy frontend ──────────────────────────────────────────────────────────
  - id: clone-web
    name: gcr.io/cloud-builders/git
    waitFor: ['-']   # run immediately, no deps
    secretEnv: [GH_PAT]
    entrypoint: bash
    args:
      - -c
      - git clone https://$$GH_PAT@github.com/$_WEB_REPO.git web

  - id: build-web
    name: node:20
    waitFor: [clone-web]
    entrypoint: bash
    args:
      - -c
      - cd web && npm ci && VITE_API_URL=$_VITE_API_URL npm run build

  - id: deploy-firebase
    name: node:20
    waitFor: [build-web]
    secretEnv: [FIREBASE_SERVICE_ACCOUNT]
    entrypoint: bash
    args:
      - -c
      - |
        cd web
        npm install -g firebase-tools
        echo "$$FIREBASE_SERVICE_ACCOUNT" > /tmp/firebase-sa.json
        GOOGLE_APPLICATION_CREDENTIALS=/tmp/firebase-sa.json \
          firebase deploy --only hosting --project $_FIREBASE_PROJECT --non-interactive

images:
  - "$_AR_REPO/api:$SHORT_SHA"
  - "$_AR_REPO/scraper:$SHORT_SHA"

options:
  machineType: E2_MEDIUM
  logging: CLOUD_LOGGING_ONLY
