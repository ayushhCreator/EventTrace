name: Deploy to GCP

on:
  push:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: asia-south1
  AR_HOST: asia-south1-docker.pkg.dev
  # Artifact Registry repo: asia-south1-docker.pkg.dev/supersahayak/supersahayak
  AR_REPO: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/supersahayak
  # Cloud SQL connection name — get via:
  # gcloud sql instances describe supersahayak-pg --format='value(connectionName)'
  SQL_CONN: ${{ secrets.GCP_PROJECT_ID }}:asia-south1:supersahayak-pg

jobs:
  # ── 1. Build & push backend images ──────────────────────────────────────────
  build-backend:
    name: Build & push API + Scraper images
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Build & push API image
        run: |
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          docker build -f Dockerfile.api -t "${{ env.AR_REPO }}/api:${SHA}" .
          docker push "${{ env.AR_REPO }}/api:${SHA}"

      - name: Build & push Scraper image
        run: |
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          docker build -f Dockerfile.scraper -t "${{ env.AR_REPO }}/scraper:${SHA}" .
          docker push "${{ env.AR_REPO }}/scraper:${SHA}"

  # ── 2. Run Alembic migrations ────────────────────────────────────────────────
  migrate:
    name: Run alembic upgrade head
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy migration Cloud Run Job
        run: |
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          IMAGE="${{ env.AR_REPO }}/api:${SHA}"
          echo "Using image: ${IMAGE}"
          gcloud run jobs deploy supersahayak-migrate \
            --image "${IMAGE}" \
            --region ${{ env.REGION }} \
            --command alembic \
            --args "upgrade,head" \
            --set-cloudsql-instances ${{ env.SQL_CONN }} \
            --set-secrets DATABASE_URL=DATABASE_URL:latest \
            --service-account ${{ secrets.GCP_RUN_SA_EMAIL }} \
            --project ${{ env.PROJECT_ID }}

      - name: Execute migration (wait for completion)
        run: |
          gcloud run jobs execute supersahayak-migrate \
            --region ${{ env.REGION }} \
            --wait \
            --project ${{ env.PROJECT_ID }}

  # ── 3. Deploy Cloud Run services ────────────────────────────────────────────
  deploy-backend:
    name: Deploy API, Monitor, Scheduler
    runs-on: ubuntu-latest
    needs: [build-backend, migrate]

    steps:
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Deploy API service
        run: |
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          gcloud run deploy supersahayak-api \
            --image "${{ env.AR_REPO }}/api:${SHA}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --port 8080 \
            --min-instances 0 \
            --max-instances 5 \
            --set-cloudsql-instances ${{ env.SQL_CONN }} \
            --set-secrets \
              DATABASE_URL=DATABASE_URL:latest,\
              JWT_SECRET=JWT_SECRET:latest,\
              MSG91_AUTH_KEY=MSG91_AUTH_KEY:latest,\
              MSG91_TEMPLATE_ID=MSG91_TEMPLATE_ID:latest,\
              OTP_HMAC_SECRET=OTP_HMAC_SECRET:latest \
            --set-env-vars CHD_API_HOST=0.0.0.0,CHD_API_PORT=8080 \
            --service-account ${{ secrets.GCP_RUN_SA_EMAIL }} \
            --project ${{ env.PROJECT_ID }}

      - name: Deploy Monitor service
        run: |
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          gcloud run deploy supersahayak-monitor \
            --image "${{ env.AR_REPO }}/scraper:${SHA}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --command scripts/start-monitor.sh \
            --min-instances 1 \
            --max-instances 1 \
            --set-cloudsql-instances ${{ env.SQL_CONN }} \
            --set-secrets \
              DATABASE_URL=DATABASE_URL:latest \
            --service-account ${{ secrets.GCP_RUN_SA_EMAIL }} \
            --project ${{ env.PROJECT_ID }}

      - name: Deploy Scheduler service
        run: |
          SHA=$(echo "${GITHUB_SHA}" | cut -c1-8)
          gcloud run deploy supersahayak-scheduler \
            --image "${{ env.AR_REPO }}/scraper:${SHA}" \
            --region ${{ env.REGION }} \
            --platform managed \
            --no-allow-unauthenticated \
            --command scripts/start-scheduler.sh \
            --min-instances 1 \
            --max-instances 1 \
            --set-cloudsql-instances ${{ env.SQL_CONN }} \
            --set-secrets \
              DATABASE_URL=DATABASE_URL:latest \
            --service-account ${{ secrets.GCP_RUN_SA_EMAIL }} \
            --project ${{ env.PROJECT_ID }}

  # ── 4. Build & deploy frontend to Firebase Hosting ──────────────────────────
  deploy-web:
    name: Deploy frontend to Firebase Hosting
    runs-on: ubuntu-latest
    needs: build-backend

    steps:
      - uses: actions/checkout@v4
        with:
          repository: ${{ secrets.WEB_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: web

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci
        working-directory: web

      - name: Build frontend
        run: npm run build
        working-directory: web
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.GCP_PROJECT_ID }}
          entryPoint: web
