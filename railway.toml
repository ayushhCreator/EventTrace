# ── API service (default) ────────────────────────────────────────────────────
# Backfills last 7 days of causelist on startup, then serves the API.
[build]
builder = "dockerfile"

[deploy]
startCommand = "scripts/start-api.sh"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicy = { type = "on-failure", maxRetries = 3 }

# ── Other services — add in Railway dashboard with these start commands ──────
